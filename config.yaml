# Contrast CI Dashboard Configuration (local experiment)
# Derived from Kata's schema; see config.yaml.kata-backup for the original.

settings:
  weather_days: 10
  refresh_interval: 60
  source_repo: "edgelesssys/contrast"

job_categories:
  snp:
    name: "SNP"
    description: "AMD SEV-SNP"
    icon: "🔐"
    patterns:
      - "Metal-QEMU-SNP"

  tdx:
    name: "TDX"
    description: "Intel TDX"
    icon: "🔐"
    patterns:
      - "Metal-QEMU-TDX"

  gpu:
    name: "GPU"
    description: "Confidential GPU (H100)"
    icon: "🎮"
    patterns:
      - "-GPU /"
      - " gpu"

required_jobs: []

external_repos: {}

notifications:
  slack:
    enabled: false

maintainers_directory: {}

sections:
  - id: metal-snp
    name: "Metal-QEMU-SNP"
    description: "Bare-metal SEV-SNP nightly matrix"
    jobs:
      - name: "Metal-QEMU-SNP / atls"
        description: "aTLS"
      - name: "Metal-QEMU-SNP / attestation"
        description: "Attestation"
      - name: "Metal-QEMU-SNP / containerd-11644-reproducer"
        description: "containerd#11644 reproducer"
      - name: "Metal-QEMU-SNP / coordinator"
        description: "Coordinator"
      - name: "Metal-QEMU-SNP / genpolicy-unsupported"
        description: "genpolicy unsupported features"
      - name: "Metal-QEMU-SNP / imagepuller-auth"
        description: "Image puller auth"
      - name: "Metal-QEMU-SNP / imagestore"
        description: "Image store"
      - name: "Metal-QEMU-SNP / kds-pcs-downtime"
        description: "KDS/PCS downtime"
      - name: "Metal-QEMU-SNP / memdump"
        description: "Memory dump"
      - name: "Metal-QEMU-SNP / multi-runtime-class"
        description: "Multi RuntimeClass"
      - name: "Metal-QEMU-SNP / openssl"
        description: "OpenSSL"
      - name: "Metal-QEMU-SNP / peerrecovery"
        description: "Peer recovery"
      - name: "Metal-QEMU-SNP / policy"
        description: "Policy"
      - name: "Metal-QEMU-SNP / proxy"
        description: "Proxy"
      - name: "Metal-QEMU-SNP / regression"
        description: "Regression"
      - name: "Metal-QEMU-SNP / servicemesh"
        description: "Service mesh"
      - name: "Metal-QEMU-SNP / vault"
        description: "Vault"
      - name: "Metal-QEMU-SNP / volumestatefulset"
        description: "Volume StatefulSet"
      - name: "Metal-QEMU-SNP / workloadsecret"
        description: "Workload secret"
      - name: "Metal-QEMU-SNP / badaml-sandbox (with debug shell)"
        description: "badaml sandbox (debug-only)"
      - name: "Metal-QEMU-SNP / badaml-vuln (with debug shell)"
        description: "badaml vuln (debug-only)"

  - id: metal-tdx
    name: "Metal-QEMU-TDX"
    description: "Bare-metal Intel TDX nightly matrix"
    jobs:
      - name: "Metal-QEMU-TDX / atls"
      - name: "Metal-QEMU-TDX / attestation"
      - name: "Metal-QEMU-TDX / containerd-11644-reproducer"
      - name: "Metal-QEMU-TDX / coordinator"
      - name: "Metal-QEMU-TDX / genpolicy-unsupported"
      - name: "Metal-QEMU-TDX / imagepuller-auth"
      - name: "Metal-QEMU-TDX / imagestore"
      - name: "Metal-QEMU-TDX / kds-pcs-downtime"
      - name: "Metal-QEMU-TDX / memdump"
      - name: "Metal-QEMU-TDX / multi-runtime-class"
      - name: "Metal-QEMU-TDX / openssl"
      - name: "Metal-QEMU-TDX / peerrecovery"
      - name: "Metal-QEMU-TDX / policy"
      - name: "Metal-QEMU-TDX / proxy"
      - name: "Metal-QEMU-TDX / regression"
      - name: "Metal-QEMU-TDX / servicemesh"
      - name: "Metal-QEMU-TDX / vault"
      - name: "Metal-QEMU-TDX / volumestatefulset"
      - name: "Metal-QEMU-TDX / workloadsecret"
      - name: "Metal-QEMU-TDX / badaml-sandbox (with debug shell)"
      - name: "Metal-QEMU-TDX / badaml-vuln (with debug shell)"

  - id: metal-snp-gpu
    name: "Metal-QEMU-SNP-GPU"
    description: "Bare-metal SEV-SNP + H100 (discovery)"
    jobs:
      - name: "Metal-QEMU-SNP-GPU / atls"
      - name: "Metal-QEMU-SNP-GPU / attestation"
      - name: "Metal-QEMU-SNP-GPU / containerd-11644-reproducer"
      - name: "Metal-QEMU-SNP-GPU / coordinator"
      - name: "Metal-QEMU-SNP-GPU / genpolicy-unsupported"
      - name: "Metal-QEMU-SNP-GPU / gpu"
      - name: "Metal-QEMU-SNP-GPU / imagepuller-auth"
      - name: "Metal-QEMU-SNP-GPU / imagestore"
      - name: "Metal-QEMU-SNP-GPU / kds-pcs-downtime"
      - name: "Metal-QEMU-SNP-GPU / memdump"
      - name: "Metal-QEMU-SNP-GPU / multi-runtime-class"
      - name: "Metal-QEMU-SNP-GPU / openssl"
      - name: "Metal-QEMU-SNP-GPU / peerrecovery"
      - name: "Metal-QEMU-SNP-GPU / policy"
      - name: "Metal-QEMU-SNP-GPU / proxy"
      - name: "Metal-QEMU-SNP-GPU / regression"
      - name: "Metal-QEMU-SNP-GPU / servicemesh"
      - name: "Metal-QEMU-SNP-GPU / vault"
      - name: "Metal-QEMU-SNP-GPU / volumestatefulset"
      - name: "Metal-QEMU-SNP-GPU / workloadsecret"

  - id: metal-tdx-gpu
    name: "Metal-QEMU-TDX-GPU"
    description: "Bare-metal Intel TDX + B200 (DGX)"
    jobs:
      - name: "Metal-QEMU-TDX-GPU / atls"
      - name: "Metal-QEMU-TDX-GPU / attestation"
      - name: "Metal-QEMU-TDX-GPU / containerd-11644-reproducer"
      - name: "Metal-QEMU-TDX-GPU / coordinator"
      - name: "Metal-QEMU-TDX-GPU / genpolicy-unsupported"
      - name: "Metal-QEMU-TDX-GPU / gpu"
      - name: "Metal-QEMU-TDX-GPU / imagepuller-auth"
      - name: "Metal-QEMU-TDX-GPU / imagestore"
      - name: "Metal-QEMU-TDX-GPU / kds-pcs-downtime"
      - name: "Metal-QEMU-TDX-GPU / memdump"
      - name: "Metal-QEMU-TDX-GPU / multi-runtime-class"
      - name: "Metal-QEMU-TDX-GPU / openssl"
      - name: "Metal-QEMU-TDX-GPU / peerrecovery"
      - name: "Metal-QEMU-TDX-GPU / policy"
      - name: "Metal-QEMU-TDX-GPU / proxy"
      - name: "Metal-QEMU-TDX-GPU / regression"
      - name: "Metal-QEMU-TDX-GPU / servicemesh"
      - name: "Metal-QEMU-TDX-GPU / vault"
      - name: "Metal-QEMU-TDX-GPU / volumestatefulset"
      - name: "Metal-QEMU-TDX-GPU / workloadsecret"

fatal_steps:
